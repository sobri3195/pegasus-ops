{% extends 'base.html' %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 bg-slate-950">
  <div class="w-full max-w-md bg-panel border border-slate-700 rounded-2xl p-8">
    <h1 class="text-2xl font-bold">Login Pegasus Ops</h1>
    <form action="/auth/login" method="post" class="space-y-4 mt-6">
      <input name="email" type="email" required placeholder="Email" class="w-full rounded bg-slate-900 p-3 border border-slate-700" />
      <input name="password" type="password" required placeholder="Password" class="w-full rounded bg-slate-900 p-3 border border-slate-700" />
      <button class="w-full bg-neon text-slate-900 rounded p-3 font-semibold">Login</button>
    </form>
    <form action="/auth/register" method="post" class="space-y-3 mt-6 pt-6 border-t border-slate-700">
      <input name="name" required placeholder="Full name" class="w-full rounded bg-slate-900 p-3 border border-slate-700" />
      <input name="email" type="email" required placeholder="Email" class="w-full rounded bg-slate-900 p-3 border border-slate-700" />
      <input name="password" type="password" required placeholder="Password min 8" class="w-full rounded bg-slate-900 p-3 border border-slate-700" />
      <button class="w-full border border-neon text-neon rounded p-3">Register</button>
    </form>
  </div>
</div>
{% endblock %}
